name: Publish

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          text = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r'^version\s*=\s*"([^"]+)"', text, re.M)
          if not match:
              raise SystemExit("Could not find version in pyproject.toml")
          pkg_version = match.group(1)
          tag = os.environ.get("GITHUB_REF_NAME", "")
          if tag.startswith("v"):
              tag = tag[1:]
          print("package version:", pkg_version)
          print("git tag:", tag)
          if pkg_version != tag:
              raise SystemExit(f"Version mismatch: package={pkg_version}, tag={tag}")
          PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test]
          python -m pip install ruff

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q -ra

      - name: CLI help smoke test
        run: |
          python -m babappai.cli --help
          python -m babappai.cli run --help
          python scripts/run_ceii_calibration_benchmark.py --help

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          text = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r'^version\s*=\s*"([^"]+)"', text, re.M)
          if not match:
              raise SystemExit("Could not find version in pyproject.toml")
          pkg_version = match.group(1)
          tag = os.environ.get("GITHUB_REF_NAME", "")
          if tag.startswith("v"):
              tag = tag[1:]
          print("package version:", pkg_version)
          print("git tag:", tag)
          if pkg_version != tag:
              raise SystemExit(f"Version mismatch: package={pkg_version}, tag={tag}")
          PY

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          rm -rf dist build *.egg-info
          python -m build --sdist --wheel
          python -m twine check dist/*

      - name: Build diagnostics
        shell: bash
        run: |
          python - <<'PY'
          import pathlib
          import re

          text = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r'^version\s*=\s*"([^"]+)"', text, re.M)
          if not match:
              raise SystemExit("Could not find version in pyproject.toml")
          print("package_version_from_source:", match.group(1))
          PY
          echo "GITHUB_REF_NAME=${GITHUB_REF_NAME}"
          ls -lh dist

      - name: Smoke install from wheel and sdist
        shell: bash
        run: |
          python -m venv /tmp/babappai-smoke-venv
          source /tmp/babappai-smoke-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python -m babappai.cli --help >/dev/null
          python -m babappai.cli version | grep '^software_version='
          python -m pip uninstall -y babappai
          python -m pip install dist/*.tar.gz
          python -m babappai.cli --help >/dev/null
          python -m babappai.cli version | grep '^software_version='

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-dist
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/project/babappai/

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
