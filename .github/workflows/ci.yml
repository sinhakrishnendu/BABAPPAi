name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            experimental: false
          - python-version: "3.12"
            experimental: false
          - python-version: "3.13"
            experimental: true
    continue-on-error: ${{ matrix.experimental }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test]
          python -m pip install ruff build twine

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

      - name: CLI help smoke test
        run: python -m babappai.cli --help

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build --sdist --wheel
          python -m twine check dist/*

      - name: Smoke install from wheel and sdist
        shell: bash
        run: |
          python -m venv /tmp/babappai-smoke-venv
          source /tmp/babappai-smoke-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python -m babappai.cli --help >/dev/null
          python -m babappai.cli version | grep '^software_version='
          python -m pip uninstall -y babappai
          python -m pip install dist/*.tar.gz
          python -m babappai.cli --help >/dev/null
          python -m babappai.cli version | grep '^software_version='

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
